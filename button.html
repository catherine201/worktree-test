<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Button Demo</title>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
    background: linear-gradient(135deg, #667eea, #764ba2);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .container {
    display: flex;
    flex-direction: column;
    gap: 16px;
    align-items: center;
  }
  button {
    padding: 12px 32px;
    font-size: 16px;
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    min-width: 200px;
  }
  button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(0,0,0,0.25);
  }
  button:active {
    transform: translateY(0);
  }
  .primary { background: #4f46e5; }
  .success { background: #10b981; }
  .danger { background: #ef4444; }
  .warning { background: #f59e0b; }
  .count {
    margin-top: 12px;
    font-size: 14px;
    color: rgba(255,255,255,0.85);
  }
</style>
</head>
<body>
  <div class="container">
    <button class="primary" onclick="handle(this, 'Primary')">主要按钮</button>
    <button class="success" onclick="handle(this, 'Success')">成功按钮</button>
    <button class="warning" onclick="handle(this, 'Warning')">警告按钮</button>
    <button class="danger" onclick="handle(this, 'Danger')">危险按钮</button>
    <p class="count">点击次数: <span id="count">0</span></p>
  </div>
<script>
  let count = 0;
  function handle(btn, type) {
    count++;
    document.getElementById('count').textContent = count;
    btn.textContent = type + ' 已点击 ' + count + ' 次';
    setTimeout(() => { btn.textContent = type === 'Primary' ? '主要按钮'
      : type === 'Success' ? '成功按钮'
      : type === 'Warning' ? '警告按钮' : '危险按钮'; }, 800);
  }
</script>
</body>
</html>
