<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>测试页面3</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
    }
    .card {
      background: #fff;
      padding: 40px 48px;
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
      text-align: center;
      max-width: 400px;
    }
    h1 { color: #333; margin-bottom: 12px; }
    p { color: #666; margin-bottom: 24px; }
    button {
      padding: 12px 28px;
      font-size: 16px;
      color: #fff;
      background: #667eea;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #556cd6; }
    #output { margin-top: 20px; font-size: 18px; color: #764ba2; min-height: 24px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hello, World! 👋</h1>
    <p>这是一个简单的测试页面。</p>
    <button onclick="handleClick()">点我一下</button>
    <div id="output"></div>
  </div>

  <script>
    let count = 0;
    function handleClick() {
      count++;
      document.getElementById('output').textContent = `你已经点击了 ${count} 次`;
    }
  </script>
</body>
</html>
