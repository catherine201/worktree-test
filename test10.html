<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天气预报</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
        }
        .container { width: 100%; max-width: 900px; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #fff; font-size: 28px; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
        .city-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }
        .city-tab {
            padding: 8px 20px;
            border: 2px solid rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.15);
            color: #fff;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .city-tab:hover { background: rgba(255,255,255,0.3); }
        .city-tab.active { background: #fff; color: #764ba2; border-color: #fff; }
        .weather-card {
            background: rgba(255,255,255,0.95);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            gap: 40px;
        }
        .weather-main { flex: 1; }
        .weather-temp {
            font-size: 64px;
            font-weight: 300;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .weather-temp .icon { font-size: 56px; }
        .weather-desc { font-size: 18px; color: #666; margin-top: 8px; }
        .weather-city { font-size: 16px; color: #999; margin-top: 4px; }
        .weather-details {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            flex: 1;
        }
        .detail-item {
            text-align: center;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .detail-label { font-size: 12px; color: #999; margin-bottom: 4px; }
        .detail-value { font-size: 18px; color: #333; font-weight: 500; }
        .forecast {
            margin-top: 24px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
        }
        .forecast-item {
            background: rgba(255,255,255,0.95);
            border-radius: 12px;
            padding: 16px 8px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .forecast-day { font-size: 13px; color: #999; margin-bottom: 6px; }
        .forecast-icon { font-size: 28px; margin-bottom: 4px; }
        .forecast-temp { font-size: 14px; color: #333; }
        .forecast-temp .low { color: #aaa; margin-left: 6px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h1>天气预报</h1></div>
        <div class="city-tabs" id="cityTabs"></div>
        <div class="weather-card" id="weatherCard"></div>
        <div class="forecast" id="forecast"></div>
    </div>
    <script>
        var data = {
            '北京': { temp: 28, icon: '☀', desc: '晴', humidity: '40%', wind: '东南风 3级', aqi: '良' },
            '上海': { temp: 25, icon: '⛅', desc: '多云', humidity: '65%', wind: '东风 4级', aqi: '优' },
            '广州': { temp: 31, icon: '🌧', desc: '小雨', humidity: '80%', wind: '南风 2级', aqi: '良' },
            '成都': { temp: 22, icon: '⛅', desc: '阴', humidity: '70%', wind: '北风 2级', aqi: '轻度污染' },
            '深圳': { temp: 30, icon: '⛅', desc: '多云', humidity: '75%', wind: '东南风 3级', aqi: '优' }
        };
        var forecastData = {
            '北京': [{d:'今天',i:'☀',h:28,l:18},{d:'明天',i:'⛅',h:26,l:17},{d:'周三',i:'🌧',h:22,l:15},{d:'周四',i:'⛅',h:24,l:16},{d:'周五',i:'☀',h:27,l:18}],
            '上海': [{d:'今天',i:'⛅',h:25,l:19},{d:'明天',i:'🌧',h:22,l:17},{d:'周三',i:'🌧',h:21,l:16},{d:'周四',i:'⛅',h:24,l:18},{d:'周五',i:'☀',h:26,l:20}],
            '广州': [{d:'今天',i:'🌧',h:31,l:25},{d:'明天',i:'🌧',h:30,l:24},{d:'周三',i:'⛅',h:32,l:25},{d:'周四',i:'⛅',h:33,l:26},{d:'周五',i:'☀',h:34,l:27}],
            '成都': [{d:'今天',i:'⛅',h:22,l:16},{d:'明天',i:'🌧',h:20,l:15},{d:'周三',i:'🌧',h:19,l:14},{d:'周四',i:'⛅',h:21,l:15},{d:'周五',i:'☀',h:24,l:17}],
            '深圳': [{d:'今天',i:'⛅',h:30,l:25},{d:'明天',i:'☀',h:32,l:26},{d:'周三',i:'☀',h:33,l:27},{d:'周四',i:'⛅',h:31,l:26},{d:'周五',i:'🌧',h:29,l:25}]
        };
        var currentCity = '北京';

        function renderTabs() {
            var tabs = document.getElementById('cityTabs');
            tabs.innerHTML = '';
            Object.keys(data).forEach(function(city) {
                var tab = document.createElement('div');
                tab.className = 'city-tab' + (city === currentCity ? ' active' : '');
                tab.textContent = city;
                tab.onclick = function() { currentCity = city; render(); };
                tabs.appendChild(tab);
            });
        }

        function renderCard() {
            var w = data[currentCity];
            document.getElementById('weatherCard').innerHTML =
                '<div class="weather-main">' +
                    '<div class="weather-temp"><span class="icon">' + w.icon + '</span>' + w.temp + '°</div>' +
                    '<div class="weather-desc">' + w.desc + '</div>' +
                    '<div class="weather-city">' + currentCity + '</div>' +
                '</div>' +
                '<div class="weather-details">' +
                    '<div class="detail-item"><div class="detail-label">湿度</div><div class="detail-value">' + w.humidity + '</div></div>' +
                    '<div class="detail-item"><div class="detail-label">风力</div><div class="detail-value">' + w.wind + '</div></div>' +
                    '<div class="detail-item"><div class="detail-label">空气质量</div><div class="detail-value">' + w.aqi + '</div></div>' +
                '</div>';
        }

        function renderForecast() {
            var items = forecastData[currentCity];
            var html = '';
            items.forEach(function(f) {
                html += '<div class="forecast-item">' +
                    '<div class="forecast-day">' + f.d + '</div>' +
                    '<div class="forecast-icon">' + f.i + '</div>' +
                    '<div class="forecast-temp">' + f.h + '°<span class="low">' + f.l + '°</span></div>' +
                '</div>';
            });
            document.getElementById('forecast').innerHTML = html;
        }

        function render() { renderTabs(); renderCard(); renderForecast(); }
        render();
    </script>
</body>
</html>
