<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>计数器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
    }
    .card {
      background: #fff;
      padding: 40px 48px;
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
      text-align: center;
      max-width: 400px;
    }
    h1 { color: #333; margin-bottom: 12px; }
    p { color: #666; margin-bottom: 24px; }
    #count {
      font-size: 56px;
      font-weight: 700;
      color: #764ba2;
      margin-bottom: 24px;
    }
    .btn-group { display: flex; gap: 12px; justify-content: center; }
    button {
      padding: 12px 24px;
      font-size: 16px;
      color: #fff;
      background: #667eea;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #556cd6; }
    button.reset { background: #ccc; }
    button.reset:hover { background: #bbb; }
  </style>
</head>
<body>
  <div class="card">
    <h1>计数器</h1>
    <p>点击按钮来增减数字</p>
    <div id="count">0</div>
    <div class="btn-group">
      <button onclick="change(-1)">-</button>
      <button onclick="change(1)">+</button>
      <button class="reset" onclick="reset()">重置</button>
    </div>
  </div>

  <script>
    let count = 0;
    function change(delta) {
      count += delta;
      document.getElementById('count').textContent = count;
    }
    function reset() {
      count = 0;
      document.getElementById('count').textContent = count;
    }
  </script>
</body>
</html>
