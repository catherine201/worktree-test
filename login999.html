<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  }
  .login-card {
    width: 360px;
    background: #fff;
    border-radius: 12px;
    padding: 40px 32px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .login-card h1 {
    text-align: center;
    font-size: 22px;
    color: #333;
    margin-bottom: 28px;
  }
  .form-group { margin-bottom: 18px; }
  .form-group label {
    display: block;
    font-size: 13px;
    color: #555;
    margin-bottom: 6px;
  }
  .form-group input {
    width: 100%;
    height: 42px;
    padding: 0 12px;
    font-size: 14px;
    border: 1px solid #ddd;
    border-radius: 6px;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus { border-color: #667eea; }
  .btn-login {
    width: 100%;
    height: 44px;
    margin-top: 8px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #fff;
    font-size: 15px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-login:hover { opacity: 0.9; }
  .msg {
    margin-top: 14px;
    font-size: 13px;
    text-align: center;
    color: #e74c3c;
    min-height: 18px;
  }
</style>
</head>
<body>
  <div class="login-card">
    <h1>用户登录</h1>
    <div class="form-group">
      <label for="username">用户名</label>
      <input id="username" type="text" placeholder="请输入用户名" autocomplete="username">
    </div>
    <div class="form-group">
      <label for="password">密码</label>
      <input id="password" type="password" placeholder="请输入密码" autocomplete="current-password">
    </div>
    <button class="btn-login" id="loginBtn">登 录</button>
    <div class="msg" id="msg"></div>
  </div>
<script>
  var btn = document.getElementById('loginBtn');
  var msg = document.getElementById('msg');
  function login() {
    var u = document.getElementById('username').value.trim();
    var p = document.getElementById('password').value.trim();
    if (!u || !p) { msg.textContent = '请输入用户名和密码'; return; }
    if (u === 'admin' && p === '123456') {
      msg.style.color = '#27ae60';
      msg.textContent = '登录成功，正在跳转...';
    } else {
      msg.style.color = '#e74c3c';
      msg.textContent = '用户名或密码错误';
    }
  }
  btn.addEventListener('click', login);
  document.getElementById('password').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') login();
  });
</script>
</body>
</html>
