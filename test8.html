<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .login-card {
      background: #fff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      width: 360px;
    }
    .login-card h1 {
      text-align: center;
      font-size: 24px;
      color: #333;
      margin-bottom: 30px;
    }
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-size: 14px;
      color: #555;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      border: 1px solid #ddd;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: #667eea; }
    .btn {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      color: #fff;
      background: #667eea;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #5568d3; }
    .msg { text-align: center; margin-top: 16px; font-size: 14px; color: #e74c3c; }
  </style>
</head>
<body>
  <div class="login-card">
    <h1>用户登录</h1>
    <form id="loginForm">
      <div class="form-group">
        <label for="username">用户名</label>
        <input type="text" id="username" placeholder="请输入用户名" autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password">
      </div>
      <button type="submit" class="btn">登录</button>
    </form>
    <p class="msg" id="msg"></p>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      var u = document.getElementById('username').value.trim();
      var p = document.getElementById('password').value.trim();
      var msg = document.getElementById('msg');
      if (!u || !p) {
        msg.textContent = '请填写用户名和密码';
        return;
      }
      if (u === 'admin' && p === '123456') {
        msg.style.color = '#27ae60';
        msg.textContent = '登录成功！';
      } else {
        msg.style.color = '#e74c3c';
        msg.textContent = '用户名或密码错误';
      }
    });
  </script>
</body>
</html>
