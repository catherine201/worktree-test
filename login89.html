<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-box {
    background: #fff;
    border-radius: 8px;
    width: 380px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }
  .login-header {
    background: #1890ff;
    color: #fff;
    text-align: center;
    padding: 30px 0;
  }
  .login-header h2 { font-size: 22px; }
  .login-header p { font-size: 13px; margin-top: 6px; opacity: 0.85; }
  .login-body { padding: 32px 30px; }
  .input-wrap {
    margin-bottom: 18px;
    border: 1px solid #d9d9d9;
    border-radius: 4px;
    display: flex;
    align-items: center;
    transition: border-color 0.2s;
  }
  .input-wrap:focus-within { border-color: #1890ff; }
  .input-wrap .icon {
    width: 40px;
    text-align: center;
    color: #bfbfbf;
    font-size: 16px;
  }
  .input-wrap input {
    flex: 1;
    border: none;
    outline: none;
    padding: 10px 0;
    font-size: 14px;
    background: transparent;
  }
  .options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    font-size: 13px;
  }
  .options label { color: #666; cursor: pointer; }
  .options a { color: #1890ff; text-decoration: none; }
  .btn {
    width: 100%;
    padding: 11px;
    background: #1890ff;
    color: #fff;
    border: none;
    border-radius: 4px;
    font-size: 15px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn:hover { background: #40a9ff; }
  .tip {
    text-align: center;
    margin-top: 14px;
    font-size: 13px;
    color: #ff4d4f;
    min-height: 20px;
  }
</style>
</head>
<body>
  <div class="login-box">
    <div class="login-header">
      <h2>欢迎登录</h2>
      <p>用户名: admin　密码: 123456</p>
    </div>
    <div class="login-body">
      <div class="input-wrap">
        <span class="icon">👤</span>
        <input type="text" id="user" placeholder="请输入用户名">
      </div>
      <div class="input-wrap">
        <span class="icon">🔒</span>
        <input type="password" id="pass" placeholder="请输入密码">
      </div>
      <div class="options">
        <label><input type="checkbox"> 记住我</label>
        <a href="javascript:void(0)">忘记密码？</a>
      </div>
      <button class="btn" onclick="doLogin()">登 录</button>
      <p class="tip" id="tip"></p>
    </div>
  </div>
  <script>
    function doLogin() {
      var u = document.getElementById('user').value.trim();
      var p = document.getElementById('pass').value.trim();
      var tip = document.getElementById('tip');
      if (!u || !p) {
        tip.textContent = '用户名和密码不能为空';
        return;
      }
      if (u === 'admin' && p === '123456') {
        tip.style.color = '#52c41a';
        tip.textContent = '登录成功！';
        setTimeout(function(){ alert('登录成功，欢迎回来，' + u + '！'); }, 200);
      } else {
        tip.textContent = '用户名或密码错误';
      }
    }
    document.getElementById('pass').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
